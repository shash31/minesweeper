<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <script src="minesweeper.js"></script> -->
     <script src="script.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="/assets/favicon.ico">
    <title>Minesweeper</title>
</head>
<body>
    <header>
        <h1>MINESWEEPER</h1>
    </header>
    <main>
        <div id="timer">00:00:00</div>
        <div id="grid"></div>
        <!-- <minesweeper-game></minesweeper-game> -->
        <label id="flags">Flags left: <span id="nflags"></span></label>
        <section>
            <label for="difficulty-select">Select difficulty: </label>
            <select id="difficulty-select">
                <option value="" disabled>--Select Difficulty for New Game--</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
        </section>
        <section id="buttons">
            <button id="reset-game-button">Reset Game</button>
            <button id="new-game-button">New Game</button>
            <button id="solve-game-button">See minesweeper bot play</button>
        </section>
        <label for="bot-speed-slider" id="bot-speed-label">Speed of bot: </label>
        <input type="range" id="bot-speed-slider" min="0" max="100" value="50"/>
    </main>
</body>
</html>
